<!DOCTYPE html>
<html>
<head>
  <title>Modern Blog App</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: #333;
    }

    /* 🔹 NAVBAR */
    .navbar {
      width: 100%;
      padding: 15px;
      background: rgba(0,0,0,0.2);
      color: white;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    /* 🔹 CONTAINER */
    .container {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* 🔹 FORM */
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    /* 🔹 BLOG GRID */
    .blogs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    /* 🔹 CARD */
    .card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card h3 {
      margin: 0;
      color: #333;
    }

    .card p {
      font-size: 14px;
      margin: 10px 0;
    }

    .card small {
      color: gray;
    }

    /* 🔹 ACTION BUTTONS */
    .actions {
      margin-top: 10px;
    }

    .edit {
      background: orange;
    }

    .delete {
      background: red;
    }

    .edit:hover {
      background: darkorange;
    }

    .delete:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<div class="navbar">📝 My Blog Platform</div>

<div class="container">

  <h2>Add / Edit Blog</h2>

  <input id="title" placeholder="Enter Title">
  <textarea id="content" placeholder="Enter Content"></textarea>
  <input id="author" placeholder="Author name">

  <button onclick="saveBlog()">Save Blog</button>

  <div class="blogs" id="blogs"></div>

</div>

<script>
let editId = null;

// 🔹 Fetch blogs
async function fetchBlogs() {
  const res = await fetch("/api/blogs");
  const data = await res.json();

  const container = document.getElementById("blogs");
  container.innerHTML = "";

  data.reverse().forEach(blog => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${blog.title}</h3>
      <p>${blog.content}</p>
      <small>By ${blog.author}</small>

      <div class="actions">
        <button class="edit" onclick='editBlog(${JSON.stringify(blog)})'>Edit</button>
        <button class="delete" onclick="deleteBlog('${blog._id}')">Delete</button>
      </div>
    `;

    container.appendChild(div);
  });
}

// 🔹 Save (Add + Update)
async function saveBlog() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const author = document.getElementById("author").value;

  if (!title || !content) {
    alert("Title and Content required!");
    return;
  }

  if (editId) {
    await fetch(`/api/blogs/${editId}`, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ title, content, author })
    });

    editId = null;
  } else {
    await fetch("/api/blogs", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ title, content, author })
    });
  }

  clearForm();
  fetchBlogs();
}

// 🔹 Edit (Auto-fill form)
function editBlog(blog) {
  document.getElementById("title").value = blog.title;
  document.getElementById("content").value = blog.content;
  document.getElementById("author").value = blog.author;

  editId = blog._id;
}

// 🔹 Delete with confirmation
async function deleteBlog(id) {
  if (!confirm("Delete this blog?")) return;

  await fetch(`/api/blogs/${id}`, {
    method: "DELETE"
  });

  fetchBlogs();
}

// 🔹 Clear form
function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("author").value = "";
}

// Load
fetchBlogs();
</script>

</body>
</html>
